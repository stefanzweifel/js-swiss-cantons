name: tests

on: push

jobs:
    tests:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20.x, 22.x, 24.x]

        name: Node ${{ matrix.node-version }}

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6.2.0
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install testing dependencies
              run: npm install

            - name: Run Tests
              run: npm test
